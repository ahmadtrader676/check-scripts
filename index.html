const savedUniqueID = localStorage.getItem('ahmad_script_uid');
const firebaseUrl = "https://reactions-maker-site-default-rtdb.firebaseio.com/users.json";

async function fillUserData() {
    if (!savedUniqueID) return;
    try {
        const response = await fetch(firebaseUrl);
        const allUsers = await response.json();
        
        for (let key in allUsers) {
            // Matching Device ID from Local Storage with Firebase 'id'
            if (allUsers[key].id === savedUniqueID) {
                const foundUser = allUsers[key];
                
                // Username fill karna
                if (foundUser.name) myDialog.querySelector('#user').value = foundUser.name;
                
                // TRADER ID fill karna (Pehle yahan Device ID aa rahi thi, ab Trader ID aayegi)
                if (foundUser.trader_id) {
                    myDialog.querySelector('#id').value = foundUser.trader_id; 
                }
                
                // Email fill karna
                if (foundUser.email) myDialog.querySelector('#email').value = foundUser.email;
                
                console.log("Ahmad Bhai, Data Synced! ✅");
                break;
            }
        }
    } catch (e) { console.log("Sync Error:", e); }
}
